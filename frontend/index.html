<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Clinical RAG</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --accent: #6366f1;
  --accent-hover: #818cf8;
  --sidebar-bg: #0f0f10;
  --sidebar-hover: #1a1a1c;
  --sidebar-active: #1e1e22;
  --sidebar-border: #2a2a2e;
  --text-primary: #f4f4f5;
  --text-muted: #71717a;
  --text-dim: #3f3f46;
  --main-bg: #ffffff;
  --input-border: #e4e4e7;
  --chip-bg: #f4f4f5;
  --chip-border: #e4e4e7;
}

body {
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", sans-serif;
  display: flex;
  height: 100vh;
  overflow: hidden;
  background: var(--main-bg);
  color: #18181b;
}

/* ═══════════════════════════════ SIDEBAR */
#sidebar {
  width: 260px;
  min-width: 260px;
  background: var(--sidebar-bg);
  display: flex;
  flex-direction: column;
  border-right: 1px solid var(--sidebar-border);
  overflow: hidden;
}

#sb-top {
  padding: 16px 12px 8px;
  flex-shrink: 0;
}
.app-label {
  font-size: 11px;
  font-weight: 600;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  color: var(--text-dim);
  padding: 0 6px;
  margin-bottom: 10px;
  display: block;
}

#new-chat-btn {
  width: 100%;
  padding: 8px 12px;
  background: transparent;
  color: var(--text-primary);
  border: 1px solid var(--sidebar-border);
  border-radius: 8px;
  font-size: 13px;
  font-weight: 500;
  cursor: pointer;
  display: flex;
  align-items: center;
  gap: 8px;
  transition: background 0.12s, border-color 0.12s;
}
#new-chat-btn:hover { background: var(--sidebar-hover); border-color: #3f3f46; }

/* Chat list */
#chat-scroll {
  flex: 1;
  overflow-y: auto;
  padding: 4px 8px 8px;
  min-height: 0;
}
#chat-scroll::-webkit-scrollbar { width: 3px; }
#chat-scroll::-webkit-scrollbar-thumb { background: #2a2a2e; border-radius: 2px; }

.chat-item {
  display: flex;
  align-items: center;
  padding: 7px 8px;
  border-radius: 7px;
  cursor: pointer;
  margin-bottom: 1px;
  transition: background 0.1s;
  border-left: 2px solid transparent;
  gap: 8px;
}
.chat-item:hover { background: var(--sidebar-hover); }
.chat-item.active {
  background: var(--sidebar-active);
  border-left-color: var(--accent);
}
.chat-item-body { flex: 1; min-width: 0; }
.chat-item-title {
  font-size: 13px;
  font-weight: 400;
  color: #a1a1aa;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  line-height: 1.4;
}
.chat-item.active .chat-item-title { color: var(--text-primary); }
.chat-item-time { font-size: 11px; color: var(--text-dim); margin-top: 1px; }

.chat-del {
  background: none;
  border: none;
  color: var(--text-dim);
  cursor: pointer;
  font-size: 13px;
  padding: 2px 4px;
  border-radius: 4px;
  opacity: 0;
  transition: opacity 0.12s, color 0.12s;
  flex-shrink: 0;
  line-height: 1;
}
.chat-item:hover .chat-del { opacity: 1; }
.chat-del:hover { color: #ef4444; }

.chat-list-empty {
  padding: 10px 8px;
  font-size: 12px;
  color: var(--text-dim);
  font-style: italic;
}

/* ═══════════════════════════════ MAIN */
#main {
  flex: 1;
  display: flex;
  flex-direction: column;
  overflow: hidden;
  position: relative;
}

/* Empty state */
#empty-state {
  flex: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 20px;
  color: #a1a1aa;
}
#empty-state h1 { font-size: 24px; font-weight: 600; color: #18181b; }
#empty-state p  { font-size: 14px; color: #71717a; }
#empty-new-btn {
  padding: 10px 24px;
  background: var(--accent);
  color: #fff;
  border: none;
  border-radius: 8px;
  font-size: 14px;
  font-weight: 600;
  cursor: pointer;
  transition: background 0.15s;
}
#empty-new-btn:hover { background: var(--accent-hover); }

/* Chat view */
#chat-view {
  flex: 1;
  display: none;
  flex-direction: column;
  overflow: hidden;
}
#chat-view.visible { display: flex; }

/* Chat title bar */
#chat-title-bar {
  padding: 12px 24px;
  border-bottom: 1px solid #f4f4f5;
  text-align: center;
  font-size: 13px;
  color: #a1a1aa;
  font-weight: 500;
  flex-shrink: 0;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}

/* Messages */
#messages {
  flex: 1;
  overflow-y: auto;
  padding: 32px 0;
  display: flex;
  flex-direction: column;
  gap: 24px;
}
#messages::-webkit-scrollbar { width: 5px; }
#messages::-webkit-scrollbar-thumb { background: #e4e4e7; border-radius: 3px; }

.msg-row {
  display: flex;
  flex-direction: column;
  padding: 0 24px;
  max-width: 100%;
}

/* User bubble */
.msg-row.user { align-items: flex-end; }
.user-bubble {
  background: var(--accent);
  color: #fff;
  padding: 10px 16px;
  border-radius: 18px 18px 4px 18px;
  font-size: 14px;
  line-height: 1.6;
  max-width: 520px;
  word-break: break-word;
  white-space: pre-wrap;
}

/* Assistant — no bubble, like Claude */
.msg-row.bot { align-items: flex-start; }
.bot-label {
  font-size: 11px;
  font-weight: 600;
  letter-spacing: 0.06em;
  text-transform: uppercase;
  color: var(--accent);
  margin-bottom: 6px;
}
.bot-content {
  font-size: 14.5px;
  line-height: 1.75;
  color: #18181b;
  max-width: 680px;
  word-break: break-word;
  white-space: pre-wrap;
}

/* Source chips */
.sources { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 10px; }
.chip {
  display: inline-flex;
  align-items: center;
  gap: 4px;
  font-size: 11px;
  font-weight: 500;
  color: #52525b;
  background: var(--chip-bg);
  border: 1px solid var(--chip-border);
  padding: 3px 9px;
  border-radius: 99px;
}

/* Typing indicator */
.typing-row { padding: 0 24px; align-self: flex-start; }
.typing-dots {
  display: flex;
  gap: 4px;
  align-items: center;
  padding: 10px 4px 4px;
}
.typing-dots span {
  width: 6px; height: 6px;
  background: #a1a1aa;
  border-radius: 50%;
  display: inline-block;
  animation: dot-bounce 1.2s infinite ease-in-out;
}
.typing-dots span:nth-child(2) { animation-delay: 0.2s; }
.typing-dots span:nth-child(3) { animation-delay: 0.4s; }
@keyframes dot-bounce {
  0%,60%,100% { transform: translateY(0); opacity: 0.5; }
  30%          { transform: translateY(-5px); opacity: 1; }
}

/* Input wrapper */
#input-wrapper {
  border-top: 1px solid #f4f4f5;
  padding: 12px 24px 16px;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 8px;
  flex-shrink: 0;
}

/* Chat doc chips (above input) */
#chat-doc-chips {
  display: flex;
  flex-wrap: wrap;
  gap: 6px;
  width: 100%;
  max-width: 720px;
  min-height: 0;
}
.doc-chip {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  font-size: 12px;
  font-weight: 500;
  color: #3f3f46;
  background: #fafafa;
  border: 1px solid #e4e4e7;
  padding: 4px 10px;
  border-radius: 8px;
}
.doc-chip .dc-icon { font-size: 14px; }
.doc-chip .dc-count { color: #a1a1aa; font-weight: 400; }
.doc-chip.uploading { color: #a1a1aa; border-style: dashed; }

/* Input box */
#input-box {
  width: 100%;
  max-width: 720px;
  border: 1.5px solid var(--input-border);
  border-radius: 14px;
  display: flex;
  align-items: flex-end;
  padding: 6px 8px 6px 12px;
  gap: 6px;
  background: #fff;
  transition: border-color 0.15s, box-shadow 0.15s;
}
#input-box:focus-within {
  border-color: #a5b4fc;
  box-shadow: 0 0 0 3px rgba(99,102,241,0.08);
}

#clip-btn {
  background: none;
  border: none;
  cursor: pointer;
  color: #a1a1aa;
  font-size: 18px;
  padding: 6px 4px;
  border-radius: 6px;
  flex-shrink: 0;
  transition: color 0.12s;
  line-height: 1;
  align-self: flex-end;
  margin-bottom: 2px;
}
#clip-btn:hover:not(:disabled) { color: var(--accent); }
#clip-btn:disabled { opacity: 0.35; cursor: not-allowed; }

#question-input {
  flex: 1;
  border: none;
  outline: none;
  font-size: 14px;
  font-family: inherit;
  resize: none;
  max-height: 160px;
  line-height: 1.6;
  color: #18181b;
  background: transparent;
  padding: 6px 0;
}
#question-input::placeholder { color: #d4d4d8; }
#question-input:disabled { background: transparent; }

#send-btn {
  width: 34px; height: 34px;
  background: var(--accent);
  color: #fff;
  border: none;
  border-radius: 8px;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 16px;
  flex-shrink: 0;
  align-self: flex-end;
  transition: background 0.12s;
  margin-bottom: 1px;
}
#send-btn:hover:not(:disabled) { background: var(--accent-hover); }
#send-btn:disabled { background: #e4e4e7; color: #a1a1aa; cursor: not-allowed; }

#disclaimer {
  font-size: 11px;
  color: #d4d4d8;
  text-align: center;
  max-width: 720px;
}
</style>
</head>
<body>

<!-- ══════════════════════ SIDEBAR ══════════════════════ -->
<aside id="sidebar">
  <div id="sb-top">
    <span class="app-label">Clinical RAG</span>
    <button id="new-chat-btn">
      <svg width="14" height="14" viewBox="0 0 14 14" fill="none">
        <path d="M7 1v12M1 7h12" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>
      </svg>
      New Chat
    </button>
  </div>
  <div id="chat-scroll">
    <div class="chat-list-empty">No chats yet.</div>
  </div>
</aside>

<!-- ══════════════════════ MAIN ══════════════════════ -->
<main id="main">

  <!-- Empty state -->
  <div id="empty-state">
    <h1>Clinical RAG</h1>
    <p>AI-powered Q&amp;A over your healthcare documents.</p>
    <button id="empty-new-btn">Start a new chat</button>
  </div>

  <!-- Chat view -->
  <div id="chat-view">
    <div id="chat-title-bar">New chat</div>

    <div id="messages"></div>

    <div id="input-wrapper">
      <div id="chat-doc-chips"></div>
      <div id="input-box">
        <button id="clip-btn" title="Upload PDF to this chat" disabled>📎</button>
        <textarea id="question-input" rows="1"
          placeholder="Ask a question…" disabled></textarea>
        <button id="send-btn" disabled>
          <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
            <path d="M2 8h12M9 3l5 5-5 5" stroke="currentColor" stroke-width="1.8"
              stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
        </button>
      </div>
      <p id="disclaimer">Clinical RAG can make mistakes. Verify important information.</p>
    </div>
  </div>
</main>

<!-- Hidden inputs -->
<input type="file" id="chat-file-input" accept=".pdf" style="display:none" />

<script>
const API_KEY = "dev-key-123";
const BASE    = window.location.origin;
const AUTH    = { "X-API-Key": API_KEY };
const AUTHJSON = { "X-API-Key": API_KEY, "Content-Type": "application/json" };

// ── State ──────────────────────────────────────────────────────────────────
let activeChatId = null;
let busy = false;

// ── DOM ────────────────────────────────────────────────────────────────────
const chatScroll    = document.getElementById("chat-scroll");
const emptyState    = document.getElementById("empty-state");
const chatView      = document.getElementById("chat-view");
const chatTitleBar  = document.getElementById("chat-title-bar");
const messages      = document.getElementById("messages");
const chatDocChips  = document.getElementById("chat-doc-chips");
const inputBox      = document.getElementById("input-box");
const clipBtn       = document.getElementById("clip-btn");
const questionInput = document.getElementById("question-input");
const sendBtn       = document.getElementById("send-btn");
const chatFileInput = document.getElementById("chat-file-input");

// ── Bootstrap ──────────────────────────────────────────────────────────────
(async function init() {
  await loadChats();
})();

// ── Chat list ──────────────────────────────────────────────────────────────
async function loadChats() {
  try {
    const r = await fetch(`${BASE}/chats`, { headers: AUTH });
    if (!r.ok) throw new Error();
    const chats = await r.json();
    renderChatList(chats);
    if (chats.length && !activeChatId) await selectChat(chats[0].id, chats[0].title);
  } catch {
    chatScroll.innerHTML = '<div class="chat-list-empty">Could not load chats.</div>';
  }
}

function renderChatList(chats) {
  if (!chats.length) {
    chatScroll.innerHTML = '<div class="chat-list-empty">No chats yet.</div>';
    return;
  }
  chatScroll.innerHTML = chats.map(c => `
    <div class="chat-item${c.id === activeChatId ? ' active' : ''}"
         data-id="${c.id}" onclick="selectChat('${c.id}','${esc(c.title)}')">
      <div class="chat-item-body">
        <div class="chat-item-title">${esc(c.title)}</div>
        <div class="chat-item-time">${relTime(c.updated_at)}</div>
      </div>
      <button class="chat-del" title="Delete" onclick="deleteChat(event,'${c.id}')">✕</button>
    </div>`).join("");
}

// ── Select chat ────────────────────────────────────────────────────────────
async function selectChat(chatId, title) {
  activeChatId = chatId;
  // Update highlight in sidebar without full re-render
  document.querySelectorAll(".chat-item").forEach(el => {
    el.classList.toggle("active", el.dataset.id === chatId);
  });
  chatTitleBar.textContent = title || "Chat";
  messages.innerHTML = "";
  chatDocChips.innerHTML = "";
  showChatView();
  enableInput();

  // Load messages and documents in parallel
  const [msgRes, docRes] = await Promise.allSettled([
    fetch(`${BASE}/chats/${chatId}`, { headers: AUTH }),
    fetch(`${BASE}/chats/${chatId}/documents`, { headers: AUTH }),
  ]);

  if (msgRes.status === "fulfilled" && msgRes.value.ok) {
    const data = await msgRes.value.json();
    chatTitleBar.textContent = data.title || "Chat";
    data.messages.forEach(m => {
      if (m.role === "user") appendUserMsg(m.content);
      else {
        let srcs = [];
        try { srcs = JSON.parse(m.sources || "[]"); } catch {}
        appendBotMsg(m.content, srcs);
      }
    });
  }

  if (docRes.status === "fulfilled" && docRes.value.ok) {
    const docs = await docRes.value.json();
    renderDocChips(docs);
  }
}

// ── New chat ───────────────────────────────────────────────────────────────
async function createNewChat() {
  try {
    const r = await fetch(`${BASE}/chats`, { method: "POST", headers: AUTH });
    if (!r.ok) throw new Error();
    const chat = await r.json();
    activeChatId = chat.id;
    messages.innerHTML = "";
    chatDocChips.innerHTML = "";
    chatTitleBar.textContent = "New chat";
    showChatView();
    enableInput();
    await loadChats();
    questionInput.focus();
  } catch {
    alert("Could not create chat. Is the server running?");
  }
}

document.getElementById("new-chat-btn").addEventListener("click", createNewChat);
document.getElementById("empty-new-btn").addEventListener("click", createNewChat);

// ── Delete chat ────────────────────────────────────────────────────────────
async function deleteChat(e, chatId) {
  e.stopPropagation();
  if (!confirm("Delete this chat?")) return;
  try {
    await fetch(`${BASE}/chats/${chatId}`, { method: "DELETE", headers: AUTH });
    if (activeChatId === chatId) {
      activeChatId = null;
      showEmptyState();
      disableInput();
    }
    await loadChats();
  } catch {
    alert("Could not delete chat.");
  }
}

// ── Per-chat upload ────────────────────────────────────────────────────────
clipBtn.addEventListener("click", () => {
  if (!activeChatId) return;
  chatFileInput.click();
});

chatFileInput.addEventListener("change", async () => {
  const file = chatFileInput.files[0];
  if (!file || !activeChatId) return;
  chatFileInput.value = "";

  // Show uploading chip immediately
  const uploading = document.createElement("div");
  uploading.className = "doc-chip uploading";
  uploading.innerHTML = `<span class="dc-icon">📄</span> ${esc(file.name)} <span class="dc-count">uploading…</span>`;
  chatDocChips.appendChild(uploading);

  const form = new FormData();
  form.append("file", file);

  try {
    const r = await fetch(`${BASE}/chats/${activeChatId}/upload`, {
      method: "POST",
      headers: AUTH,
      body: form,
    });
    if (!r.ok) {
      const d = await r.json();
      throw new Error(d.detail || r.statusText);
    }
    uploading.innerHTML = `<span class="dc-icon">📄</span> ${esc(file.name)} <span class="dc-count">indexing…</span>`;
    // Poll for real chunk counts a few times
    setTimeout(() => refreshChatDocs(activeChatId), 4000);
    setTimeout(() => refreshChatDocs(activeChatId), 10000);
    setTimeout(() => refreshChatDocs(activeChatId), 20000);
  } catch (err) {
    uploading.innerHTML = `<span class="dc-icon">⚠️</span> ${esc(file.name)} <span class="dc-count">${esc(err.message)}</span>`;
  }
});

async function refreshChatDocs(chatId) {
  if (chatId !== activeChatId) return;
  try {
    const r = await fetch(`${BASE}/chats/${chatId}/documents`, { headers: AUTH });
    if (!r.ok) return;
    const docs = await r.json();
    renderDocChips(docs);
  } catch {}
}

function renderDocChips(docs) {
  chatDocChips.innerHTML = docs.map(d => `
    <div class="doc-chip">
      <span class="dc-icon">📄</span>
      ${esc(d.source)}
      <span class="dc-count">· ${d.chunk_count} chunks</span>
    </div>`).join("");
}

// ── Send message ───────────────────────────────────────────────────────────
questionInput.addEventListener("keydown", e => {
  if (e.key === "Enter" && !e.shiftKey) { e.preventDefault(); sendMessage(); }
});
questionInput.addEventListener("input", () => {
  questionInput.style.height = "auto";
  questionInput.style.height = Math.min(questionInput.scrollHeight, 160) + "px";
  sendBtn.disabled = !questionInput.value.trim() || busy;
});
sendBtn.addEventListener("click", sendMessage);

async function sendMessage() {
  const text = questionInput.value.trim();
  if (!text || busy || !activeChatId) return;

  busy = true;
  sendBtn.disabled = true;
  questionInput.value = "";
  questionInput.style.height = "auto";

  appendUserMsg(text);
  const typing = appendTyping();

  try {
    const r = await fetch(`${BASE}/query`, {
      method: "POST",
      headers: AUTHJSON,
      body: JSON.stringify({ question: text, chat_id: activeChatId, top_k: 5 }),
    });
    const data = await r.json();
    typing.remove();
    if (!r.ok) throw new Error(data.detail || r.statusText);
    appendBotMsg(data.answer, data.sources || []);
    // Refresh sidebar timestamps
    loadChats();
  } catch (err) {
    typing.remove();
    appendBotMsg(`⚠️ ${err.message}`, []);
  } finally {
    busy = false;
    sendBtn.disabled = !questionInput.value.trim();
  }
}

// ── Message rendering ──────────────────────────────────────────────────────
function appendUserMsg(text) {
  const row = mkEl("div", "msg-row user");
  row.innerHTML = `<div class="user-bubble">${esc(text)}</div>`;
  messages.appendChild(row);
  scrollBottom();
}

function appendBotMsg(text, sources) {
  const deduped = dedupSources(sources);
  const chips = deduped.map(s =>
    `<div class="chip">📄 ${esc(s.source)} · p.${s.page}</div>`).join("");
  const row = mkEl("div", "msg-row bot");
  row.innerHTML = `
    <div class="bot-label">Clinical RAG</div>
    <div class="bot-content">${esc(text)}</div>
    ${chips ? `<div class="sources">${chips}</div>` : ""}`;
  messages.appendChild(row);
  scrollBottom();
}

function appendTyping() {
  const row = mkEl("div", "msg-row bot typing-row");
  row.innerHTML = `
    <div class="bot-label">Clinical RAG</div>
    <div class="typing-dots"><span></span><span></span><span></span></div>`;
  messages.appendChild(row);
  scrollBottom();
  return row;
}

// ── UI helpers ─────────────────────────────────────────────────────────────
function showChatView()  { emptyState.style.display = "none"; chatView.classList.add("visible"); }
function showEmptyState(){ emptyState.style.display = ""; chatView.classList.remove("visible"); }

function enableInput() {
  questionInput.disabled = false;
  clipBtn.disabled = false;
  questionInput.focus();
}
function disableInput() {
  questionInput.disabled = true;
  sendBtn.disabled = true;
  clipBtn.disabled = true;
}

function scrollBottom() { messages.scrollTop = messages.scrollHeight; }

function mkEl(tag, cls) {
  const e = document.createElement(tag);
  if (cls) e.className = cls;
  return e;
}

function dedupSources(sources) {
  const seen = new Set();
  return (sources || []).filter(s => {
    const k = `${s.source}:${s.page}`;
    return seen.has(k) ? false : (seen.add(k), true);
  });
}

function esc(v) {
  return String(v ?? "")
    .replace(/&/g,"&amp;").replace(/</g,"&lt;")
    .replace(/>/g,"&gt;").replace(/"/g,"&quot;");
}

function relTime(iso) {
  const d = new Date(iso.endsWith("Z") ? iso : iso + "Z");
  const s = Math.floor((Date.now() - d) / 1000);
  if (s < 60)    return "just now";
  if (s < 3600)  return `${Math.floor(s/60)}m ago`;
  if (s < 86400) return `${Math.floor(s/3600)}h ago`;
  return `${Math.floor(s/86400)}d ago`;
}

// Periodic refresh
setInterval(loadChats, 60000);
</script>
</body>
</html>
