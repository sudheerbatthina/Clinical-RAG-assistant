<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Clinical RAG Assistant</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    background: #f0f2f5;
    display: flex;
    height: 100vh;
    overflow: hidden;
    color: #1a1a2e;
  }

  /* ── Sidebar ── */
  #sidebar {
    width: 260px;
    min-width: 260px;
    background: #1a1a2e;
    color: #e8eaf6;
    display: flex;
    flex-direction: column;
    padding: 0;
    overflow: hidden;
  }

  #sidebar-header {
    padding: 24px 20px 20px;
    border-bottom: 1px solid rgba(255,255,255,0.08);
  }

  #sidebar-header h1 {
    font-size: 16px;
    font-weight: 700;
    letter-spacing: 0.3px;
    display: flex;
    align-items: center;
    gap: 8px;
    color: #fff;
  }

  #sidebar-header p {
    font-size: 11px;
    color: #7986cb;
    margin-top: 4px;
    padding-left: 28px;
  }

  #upload-btn {
    margin: 16px;
    padding: 10px 14px;
    background: #3f51b5;
    color: #fff;
    border: none;
    border-radius: 8px;
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
    display: flex;
    align-items: center;
    gap: 8px;
    transition: background 0.15s;
  }
  #upload-btn:hover { background: #5c6bc0; }
  #upload-btn:disabled { background: #455a64; cursor: not-allowed; }

  #upload-status {
    margin: 0 16px 12px;
    font-size: 11px;
    min-height: 16px;
    color: #80cbc4;
  }
  #upload-status.error { color: #ef9a9a; }

  #upload-progress {
    margin: 0 16px 12px;
    height: 3px;
    background: rgba(255,255,255,0.1);
    border-radius: 2px;
    display: none;
  }
  #upload-progress-bar {
    height: 100%;
    background: #3f51b5;
    border-radius: 2px;
    width: 0%;
    transition: width 0.3s;
  }

  #docs-label {
    padding: 0 16px 8px;
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 1px;
    text-transform: uppercase;
    color: #546e7a;
  }

  #doc-list {
    flex: 1;
    overflow-y: auto;
    padding: 0 8px 16px;
  }

  #doc-list::-webkit-scrollbar { width: 4px; }
  #doc-list::-webkit-scrollbar-track { background: transparent; }
  #doc-list::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 2px; }

  .doc-item {
    display: flex;
    align-items: flex-start;
    gap: 8px;
    padding: 8px 10px;
    border-radius: 6px;
    margin-bottom: 2px;
    transition: background 0.1s;
  }
  .doc-item:hover { background: rgba(255,255,255,0.05); }

  .doc-icon { font-size: 16px; flex-shrink: 0; margin-top: 1px; }

  .doc-info { min-width: 0; }
  .doc-name {
    font-size: 12px;
    font-weight: 500;
    color: #e8eaf6;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    max-width: 170px;
  }
  .doc-chunks { font-size: 10px; color: #546e7a; margin-top: 2px; }

  .doc-empty {
    padding: 12px 10px;
    font-size: 12px;
    color: #546e7a;
    font-style: italic;
  }

  /* ── Main ── */
  #main {
    flex: 1;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  #chat-header {
    background: #fff;
    padding: 16px 24px;
    border-bottom: 1px solid #e0e0e0;
    display: flex;
    align-items: center;
    gap: 10px;
  }
  #chat-header h2 { font-size: 15px; font-weight: 600; color: #1a1a2e; }
  #chat-header p  { font-size: 12px; color: #90a4ae; }

  #messages {
    flex: 1;
    overflow-y: auto;
    padding: 24px;
    display: flex;
    flex-direction: column;
    gap: 16px;
  }
  #messages::-webkit-scrollbar { width: 6px; }
  #messages::-webkit-scrollbar-track { background: transparent; }
  #messages::-webkit-scrollbar-thumb { background: #cfd8dc; border-radius: 3px; }

  .msg-row {
    display: flex;
    flex-direction: column;
    max-width: 72%;
  }
  .msg-row.user { align-self: flex-end; align-items: flex-end; }
  .msg-row.bot  { align-self: flex-start; align-items: flex-start; }

  .bubble {
    padding: 12px 16px;
    border-radius: 16px;
    font-size: 14px;
    line-height: 1.55;
    word-break: break-word;
    white-space: pre-wrap;
  }
  .user .bubble {
    background: #3f51b5;
    color: #fff;
    border-bottom-right-radius: 4px;
  }
  .bot .bubble {
    background: #fff;
    color: #1a1a2e;
    border-bottom-left-radius: 4px;
    box-shadow: 0 1px 4px rgba(0,0,0,0.08);
  }

  .sources {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
    margin-top: 8px;
  }
  .source-chip {
    background: #e8eaf6;
    color: #3f51b5;
    font-size: 11px;
    font-weight: 600;
    padding: 3px 8px;
    border-radius: 12px;
    white-space: nowrap;
  }

  /* Typing indicator */
  .typing-bubble {
    background: #fff;
    border-radius: 16px;
    border-bottom-left-radius: 4px;
    padding: 14px 18px;
    box-shadow: 0 1px 4px rgba(0,0,0,0.08);
    display: flex;
    gap: 5px;
    align-items: center;
  }
  .typing-bubble span {
    width: 7px; height: 7px;
    background: #90a4ae;
    border-radius: 50%;
    display: inline-block;
    animation: bounce 1.2s infinite ease-in-out;
  }
  .typing-bubble span:nth-child(2) { animation-delay: 0.2s; }
  .typing-bubble span:nth-child(3) { animation-delay: 0.4s; }
  @keyframes bounce {
    0%, 60%, 100% { transform: translateY(0); }
    30%           { transform: translateY(-6px); }
  }

  /* Empty state */
  #empty-state {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    color: #b0bec5;
    gap: 12px;
    pointer-events: none;
  }
  #empty-state .icon { font-size: 48px; }
  #empty-state p { font-size: 14px; }

  /* Input bar */
  #input-bar {
    background: #fff;
    border-top: 1px solid #e0e0e0;
    padding: 16px 24px;
    display: flex;
    gap: 12px;
    align-items: flex-end;
  }

  #question-input {
    flex: 1;
    border: 1.5px solid #e0e0e0;
    border-radius: 12px;
    padding: 10px 14px;
    font-size: 14px;
    font-family: inherit;
    resize: none;
    outline: none;
    max-height: 140px;
    line-height: 1.5;
    transition: border-color 0.15s;
    color: #1a1a2e;
  }
  #question-input:focus { border-color: #3f51b5; }
  #question-input::placeholder { color: #b0bec5; }

  #send-btn {
    width: 42px; height: 42px;
    background: #3f51b5;
    color: #fff;
    border: none;
    border-radius: 10px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    transition: background 0.15s;
    font-size: 18px;
  }
  #send-btn:hover { background: #5c6bc0; }
  #send-btn:disabled { background: #cfd8dc; cursor: not-allowed; }

  #input-hint {
    font-size: 11px;
    color: #b0bec5;
    padding: 0 4px 4px;
    align-self: flex-start;
  }
</style>
</head>
<body>

<!-- ═══════════════ SIDEBAR ═══════════════ -->
<aside id="sidebar">
  <div id="sidebar-header">
    <h1>&#x1FA7A; Clinical RAG</h1>
    <p>Healthcare document Q&amp;A</p>
  </div>

  <button id="upload-btn">
    <span>&#x2B06;</span> Upload PDF
  </button>
  <input type="file" id="file-input" accept=".pdf" style="display:none" />
  <div id="upload-progress"><div id="upload-progress-bar"></div></div>
  <div id="upload-status"></div>

  <div id="docs-label">Indexed Documents</div>
  <div id="doc-list"><div class="doc-empty">Loading…</div></div>
</aside>

<!-- ═══════════════ MAIN ═══════════════ -->
<main id="main">
  <div id="chat-header">
    <div>
      <h2>Ask a clinical question</h2>
      <p>Answers grounded in your uploaded documents</p>
    </div>
  </div>

  <div id="messages">
    <div id="empty-state">
      <div class="icon">&#x1F4CB;</div>
      <p>Upload a PDF, then ask a question to get started.</p>
    </div>
  </div>

  <div id="input-bar">
    <div style="flex:1; display:flex; flex-direction:column; gap:6px;">
      <textarea
        id="question-input"
        rows="1"
        placeholder="Ask about your clinical documents…"
      ></textarea>
      <span id="input-hint">Press Enter to send &nbsp;·&nbsp; Shift+Enter for newline</span>
    </div>
    <button id="send-btn" title="Send">&#x27A4;</button>
  </div>
</main>

<script>
  const API_KEY = "dev-key-123";
  const BASE    = window.location.origin;

  const uploadBtn      = document.getElementById("upload-btn");
  const fileInput      = document.getElementById("file-input");
  const uploadStatus   = document.getElementById("upload-status");
  const uploadProgress = document.getElementById("upload-progress");
  const uploadBar      = document.getElementById("upload-progress-bar");
  const docList        = document.getElementById("doc-list");
  const messages       = document.getElementById("messages");
  const emptyState     = document.getElementById("empty-state");
  const questionInput  = document.getElementById("question-input");
  const sendBtn        = document.getElementById("send-btn");

  // ── Auto-resize textarea ──────────────────────────────────────────────
  questionInput.addEventListener("input", () => {
    questionInput.style.height = "auto";
    questionInput.style.height = Math.min(questionInput.scrollHeight, 140) + "px";
  });

  // ── Enter to send ─────────────────────────────────────────────────────
  questionInput.addEventListener("keydown", e => {
    if (e.key === "Enter" && !e.shiftKey) { e.preventDefault(); sendMessage(); }
  });
  sendBtn.addEventListener("click", sendMessage);

  // ── Fetch document list ───────────────────────────────────────────────
  async function loadDocs() {
    try {
      const r = await fetch(`${BASE}/documents`);
      if (!r.ok) throw new Error(r.statusText);
      const docs = await r.json();
      renderDocs(docs);
    } catch {
      docList.innerHTML = '<div class="doc-empty">Could not load documents.</div>';
    }
  }

  function renderDocs(docs) {
    if (!docs.length) {
      docList.innerHTML = '<div class="doc-empty">No documents indexed yet.</div>';
      return;
    }
    docList.innerHTML = docs.map(d => `
      <div class="doc-item">
        <span class="doc-icon">&#x1F4C4;</span>
        <div class="doc-info">
          <div class="doc-name" title="${esc(d.source)}">${esc(d.source)}</div>
          <div class="doc-chunks">${d.chunk_count} chunk${d.chunk_count !== 1 ? "s" : ""}</div>
        </div>
      </div>`).join("");
  }

  // ── Upload PDF ────────────────────────────────────────────────────────
  uploadBtn.addEventListener("click", () => fileInput.click());

  fileInput.addEventListener("change", async () => {
    const file = fileInput.files[0];
    if (!file) return;
    fileInput.value = "";

    uploadBtn.disabled = true;
    setUploadStatus("", false);
    uploadProgress.style.display = "block";
    animateProgress();

    const form = new FormData();
    form.append("file", file);

    try {
      const r = await fetch(`${BASE}/upload`, {
        method: "POST",
        headers: { "X-API-Key": API_KEY },
        body: form,
      });
      const data = await r.json();
      if (!r.ok) throw new Error(data.detail || r.statusText);
      setUploadStatus(`✓ ${file.name} — indexing in background`, false);
      setTimeout(loadDocs, 3000);
      setTimeout(loadDocs, 8000);
    } catch (err) {
      setUploadStatus(`Upload failed: ${err.message}`, true);
    } finally {
      uploadProgress.style.display = "none";
      uploadBar.style.width = "0%";
      uploadBtn.disabled = false;
    }
  });

  function animateProgress() {
    let pct = 0;
    const iv = setInterval(() => {
      pct = Math.min(pct + Math.random() * 12, 90);
      uploadBar.style.width = pct + "%";
      if (uploadProgress.style.display === "none") clearInterval(iv);
    }, 300);
  }

  function setUploadStatus(msg, isError) {
    uploadStatus.textContent = msg;
    uploadStatus.className = isError ? "error" : "";
  }

  // ── Chat ──────────────────────────────────────────────────────────────
  let busy = false;

  function sendMessage() {
    const text = questionInput.value.trim();
    if (!text || busy) return;

    hideEmpty();
    appendUserMsg(text);
    questionInput.value = "";
    questionInput.style.height = "auto";

    const typing = appendTyping();
    busy = true;
    sendBtn.disabled = true;

    fetch(`${BASE}/query`, {
      method: "POST",
      headers: {
        "Content-Type": "application/json",
        "X-API-Key": API_KEY,
      },
      body: JSON.stringify({ question: text, top_k: 5 }),
    })
    .then(r => r.json().then(d => ({ ok: r.ok, data: d })))
    .then(({ ok, data }) => {
      typing.remove();
      if (!ok) throw new Error(data.detail || "Unknown error");
      appendBotMsg(data.answer, data.sources || []);
    })
    .catch(err => {
      typing.remove();
      appendBotMsg(`⚠️ ${err.message}`, []);
    })
    .finally(() => {
      busy = false;
      sendBtn.disabled = false;
    });
  }

  function hideEmpty() {
    if (emptyState) emptyState.style.display = "none";
  }

  function appendUserMsg(text) {
    const row = document.createElement("div");
    row.className = "msg-row user";
    row.innerHTML = `<div class="bubble">${esc(text)}</div>`;
    messages.appendChild(row);
    scrollBottom();
  }

  function appendBotMsg(text, sources) {
    const chips = dedupSources(sources).map(s =>
      `<span class="source-chip">${esc(s.source)} &middot; p.${s.page}</span>`
    ).join("");

    const row = document.createElement("div");
    row.className = "msg-row bot";
    row.innerHTML = `
      <div class="bubble">${esc(text)}</div>
      ${chips ? `<div class="sources">${chips}</div>` : ""}
    `;
    messages.appendChild(row);
    scrollBottom();
  }

  function appendTyping() {
    const row = document.createElement("div");
    row.className = "msg-row bot";
    row.innerHTML = `
      <div class="typing-bubble">
        <span></span><span></span><span></span>
      </div>`;
    messages.appendChild(row);
    scrollBottom();
    return row;
  }

  function dedupSources(sources) {
    const seen = new Set();
    return sources.filter(s => {
      const key = `${s.source}:${s.page}`;
      if (seen.has(key)) return false;
      seen.add(key); return true;
    });
  }

  function scrollBottom() {
    messages.scrollTop = messages.scrollHeight;
  }

  function esc(str) {
    return String(str)
      .replace(/&/g, "&amp;")
      .replace(/</g, "&lt;")
      .replace(/>/g, "&gt;")
      .replace(/"/g, "&quot;");
  }

  // ── Init ──────────────────────────────────────────────────────────────
  loadDocs();
  setInterval(loadDocs, 30000);
</script>
</body>
</html>
